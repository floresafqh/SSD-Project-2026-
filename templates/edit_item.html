{% extends 'base.html' %}

{% block content %}
<h2>Edit Inventory Item</h2>

{% if messages %}
    {% for message in messages %}
        <div class="error-msg">{{ message }}</div>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %} <div class="form-group">
        <label>Item Name:</label>
        <input type="text" name="name" value="{{ item.name }}" required>
    </div>
    
    <div class="form-group">
        <label>Quantity:</label>
        <input type="number" name="quantity" value="{{ item.quantity }}" min="0" required>
    </div>
    
    <div class="form-group">
        <label>Price (RM):</label>
        <input type="number" name="price" value="{{ item.price }}" step="0.01" min="0.00" required>
    </div>
    
    <button type="submit" style="background-color: #3498db; margin-bottom: 10px;">Update Item Details</button>
</form>

<a href="{% url 'dashboard' %}" style="display: block; text-align: center; color: #7f8c8d; text-decoration: none; margin-top: 10px;">Cancel and Go Back</a>
{% endblock %}
